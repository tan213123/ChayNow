spring.application.name=BE

# ==========================================
# DATASOURCE CONFIGURATION
# ==========================================

# Option A: PostgreSQL (Default via Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/chaynow
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#server.port=8081

# Option B: H2 In-Memory Database (Uncomment to use for transient testing)
# spring.datasource.url=jdbc:h2:mem:chaynowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# Option C: Microsoft SQL Server
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=chaynow;encrypt=true;trustServerCertificate=true
# spring.datasource.username=your_username
# spring.datasource.password=your_password
# spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# SECURITY & JWT CONFIGURATION
# ==========================================
# Secret key must be at least 256 bits (32 bytes) hex-encoded or plain text. 
# Below is a sample 256-bit key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Token expiration time: 86400000 ms (24 hours)
application.security.jwt.expiration=86400000

# Respect X-Forwarded-* headers for proxy (ngrok)
server.forward-headers-strategy=framework
